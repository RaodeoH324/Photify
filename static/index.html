<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHOTIFY — Local Music Player</title>
  <meta name="description" content="Premium offline music streaming from your local library">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="dot"></div>
        <h1>PHOTIFY</h1>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-item active" data-route="home">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
          </div>
          <div class="nav-item" data-route="library">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            Library
          </div>
          <div class="nav-item" data-route="search">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Search
          </div>
          <div class="nav-item" data-route="albums">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            Albums
          </div>
          <div class="nav-item" data-route="artists">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Artists
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Playlists</div>
          <div id="playlist-nav"></div>
        </div>
      </nav>
      <div class="sidebar-bottom">
        <button class="scan-btn" onclick="App.openSettings()" style="background:var(--bg-tertiary); color:var(--text-primary); margin-bottom:10px;">
          ⚙️ Settings
        </button>
        <button class="scan-btn" id="scan-btn" onclick="App.triggerScan()">
          ⟳ Scan Library
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="main-header">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search tracks, artists, albums..." oninput="App.onSearch(this.value)">
        </div>
        <span class="main-title" id="page-title"></span>
      </div>
      <div class="content" id="content"></div>
    </main>

    <!-- Player Bar -->
    <div class="player" id="player-bar">
      <div class="player-track">
        <div class="player-cover" id="player-cover">
          <img id="player-cover-img" src="" alt="">
        </div>
        <div class="player-info">
          <div class="player-title" id="player-title">Not Playing</div>
          <div class="player-artist" id="player-artist">—</div>
        </div>
        <button class="player-like" id="player-like" onclick="App.toggleLike()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>

      <div class="player-controls">
        <div class="player-buttons">
          <button class="player-btn" id="shuffle-btn" onclick="App.toggleShuffle()" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
          <button class="player-btn" onclick="App.prev()" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="play-btn" id="play-btn" onclick="App.togglePlay()">
            <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button class="player-btn" onclick="App.next()" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-3.5 6L4 6v12z"/></svg>
          </button>
          <button class="player-btn" id="repeat-btn" onclick="App.toggleRepeat()" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>
        <div class="progress-bar">
          <span class="progress-time" id="current-time">0:00</span>
          <div class="progress-track" id="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <span class="progress-time" id="total-time">0:00</span>
        </div>
      </div>

      <div class="player-extra">
        <div class="volume-control">
          <button class="volume-btn" onclick="App.toggleMute()">
            <svg id="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <div class="volume-slider" onclick="App.setVolume(event)">
            <div class="volume-fill" id="volume-fill" style="width:80%"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toasts"></div>

  <!-- Default Cover SVG (inline for offline) -->
  <template id="default-cover-svg">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="60" fill="none" stroke="#333" stroke-width="2"/>
      <circle cx="100" cy="100" r="20" fill="none" stroke="#333" stroke-width="2"/>
      <circle cx="100" cy="100" r="4" fill="#444"/>
    </svg>
  </template>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal" style="display:none;">
    <div class="modal">
      <h2>Settings</h2>
      <p>Configure your music library directories.</p>
      
      <div id="dir-list" class="dir-list">
        <!-- Directories will be injected here -->
      </div>
      
      <div style="display:flex; gap:8px;">
        <input type="text" id="new-dir-input" placeholder="e.g. C:\Music or /Users/name/Music">
        <button class="modal-btn secondary" onclick="App.addDirectory()">Add</button>
      </div>
      
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="App.closeSettings()">Cancel</button>
        <button class="modal-btn primary" onclick="App.saveSettings()">Save & Scan</button>
      </div>
    </div>
  </div>

  <!-- Edit Track Modal -->
  <div class="modal-overlay" id="edit-modal" style="display:none;">
    <div class="modal">
      <h2>Edit Metadata</h2>
      <p id="edit-track-filename" style="font-size:12px; color:var(--text-secondary); margin-bottom:15px;"></p>
      
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="edit-title" placeholder="Song Title">
      </div>
      
      <div class="form-group">
        <label>Artist</label>
        <input type="text" id="edit-artist" placeholder="Artist Name">
      </div>
      
      <div class="form-group">
        <label>Album</label>
        <input type="text" id="edit-album" placeholder="Album Name">
      </div>
      
      <div class="form-group">
        <label>Genre</label>
        <select id="edit-genre">
          <option value="">Select Genre</option>
          <option value="Bollywood">Bollywood</option>
          <option value="Classical">Classical</option>
          <option value="Ghazal">Ghazal</option>
          <option value="Bhajan">Bhajan</option>
          <option value="Qawwali">Qawwali</option>
          <option value="Punjabi">Punjabi</option>
          <option value="Pop">Pop</option>
          <option value="Rock">Rock</option>
          <option value="Hip Hop">Hip Hop</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Lyrics</label>
        <textarea id="edit-lyrics" placeholder="Paste or type lyrics here..." style="min-height:120px; resize:vertical; font-family:inherit;"></textarea>
      </div>

      <input type="hidden" id="edit-track-id">
      
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="App.closeEditModal()">Cancel</button>
        <button class="modal-btn primary" onclick="App.saveTrackMetadata()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
